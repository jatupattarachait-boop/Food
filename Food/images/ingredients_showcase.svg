<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f1916" />
      <stop offset="100%" stop-color="#060908" />
    </radialGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#39ff14" />
      <stop offset="100%" stop-color="#00ffcc" />
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-glow)" />

  <!-- Dotted Grid background -->
  <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="0.7" fill="#39ff14" fill-opacity="0.08" />
  </pattern>
  <rect width="800" height="450" fill="url(#grid)" />

  <!-- Technical Circular Radar/Diagram -->
  <g transform="translate(400, 200)" opacity="0.3">
    <circle r="160" fill="none" stroke="#00ffcc" stroke-opacity="0.2" stroke-width="1" />
    <circle r="140" fill="none" stroke="#00ffcc" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="10 15" />
    <circle r="180" fill="none" stroke="#00ffcc" stroke-opacity="0.05" stroke-width="1" />
    <!-- Rotating ticks -->
    <path d="M 0 -160 L 0 -170 M 0 160 L 0 170 M -160 0 L -170 0 M 160 0 L 170 0" stroke="#00ffcc" stroke-width="2" />
  </g>

  <!-- Center Bio-Pod/Capsule -->
  <g transform="translate(400, 210)">
    <!-- Base Plate -->
    <rect x="-70" y="110" width="140" height="20" rx="4" fill="#11221b" stroke="#00ffcc" stroke-opacity="0.5" stroke-width="1.5" />
    <line x1="-50" y1="120" x2="50" y2="120" stroke="#39ff14" stroke-width="2" filter="url(#glow-green)" />

    <!-- Glass Cylinder Capsule -->
    <rect x="-60" y="-120" width="120" height="230" rx="30" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1" />
    
    <!-- Inner Glowing Liquid Line (Bottom) -->
    <path d="M -59 60 Q 0 70 59 60 L 59 105 Q 0 110 -59 105 Z" fill="#00ffcc" fill-opacity="0.1" />

    <!-- Bio-engineered Glowing Plant -->
    <path d="M 0 110 C -10 60 -5 30 0 -20" fill="none" stroke="url(#neon-green)" stroke-width="5" stroke-linecap="round" filter="url(#glow-green)" />
    <!-- Glowing Leaves -->
    <path d="M 0 70 C -30 65 -40 35 -15 35 C -5 35 0 55 0 70 Z" fill="url(#neon-green)" fill-opacity="0.8" filter="url(#glow-green)" />
    <path d="M 0 45 C 30 40 40 10 15 10 C 5 10 0 30 0 45 Z" fill="url(#neon-green)" fill-opacity="0.8" filter="url(#glow-green)" />
    <path d="M 0 15 C -25 5 -30 -15 -10 -20 C 0 -22 0 0 0 15 Z" fill="url(#neon-green)" fill-opacity="0.9" filter="url(#glow-green)" />
    <!-- Floating Bio-spores (energy particles) -->
    <circle cx="-25" cy="10" r="3" fill="#39ff14" filter="url(#glow-green)"><animate attributeName="cy" values="10;-50;10" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="28" cy="-15" r="2.5" fill="#00ffcc" filter="url(#glow-green)"><animate attributeName="cy" values="-15;-80;-15" dur="4.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.9;0;0.9" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="-10" cy="-40" r="2" fill="#39ff14" filter="url(#glow-green)"><animate attributeName="cy" values="-40;-90;-40" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite"/></circle>

    <!-- Top Capsule Cap -->
    <rect x="-60" y="-130" width="120" height="15" rx="3" fill="#11221b" stroke="#00ffcc" stroke-opacity="0.4" stroke-width="1" />
  </g>

  <!-- UI Telemetry Sidebars -->
  <!-- Left Panel -->
  <g transform="translate(60, 80)">
    <rect width="180" height="240" rx="8" fill="#000000" fill-opacity="0.4" stroke="#00ffcc" stroke-opacity="0.2" stroke-width="1" />
    <text x="15" y="30" fill="#00ffcc" font-family="'Courier New', monospace" font-size="12" font-weight="bold">INGREDIENT_ANALYSIS</text>
    <line x1="15" y1="40" x2="165" y2="40" stroke="#00ffcc" stroke-opacity="0.3" stroke-width="1" />
    
    <text x="15" y="65" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">TYPE: ECO-BIO_SYNTH</text>
    <text x="15" y="90" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">PURITY: <tspan fill="#39ff14">99.85%</tspan></text>
    <text x="15" y="115" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">TEMP: 18.4 C</text>
    <text x="15" y="140" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">PH LEVEL: 6.8</text>
    
    <rect x="15" y="165" width="150" height="8" rx="4" fill="#11221b" />
    <rect x="15" y="165" width="112" height="8" rx="4" fill="#39ff14" filter="url(#glow-green)" />
    <text x="15" y="190" fill="#ffffff" fill-opacity="0.4" font-family="'Courier New', monospace" font-size="8">OPTIMIZING SPECTRUM...</text>

    <!-- Scan Line -->
    <line x1="15" y1="215" x2="165" y2="215" stroke="#39ff14" stroke-width="1" filter="url(#glow-green)">
      <animate attributeName="y1" values="50;225;50" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" values="50;225;50" dur="4s" repeatCount="indefinite" />
    </line>
  </g>

  <!-- Right Panel -->
  <g transform="translate(560, 80)">
    <rect width="180" height="240" rx="8" fill="#000000" fill-opacity="0.4" stroke="#00ffcc" stroke-opacity="0.2" stroke-width="1" />
    <text x="15" y="30" fill="#00ffcc" font-family="'Courier New', monospace" font-size="12" font-weight="bold">SUSTAINABLE_STATS</text>
    <line x1="15" y1="40" x2="165" y2="40" stroke="#00ffcc" stroke-opacity="0.3" stroke-width="1" />

    <text x="15" y="65" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">CARBON FOOTPRINT: <tspan fill="#39ff14">-12%</tspan></text>
    <text x="15" y="90" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">WATER SAVED: 85L</text>
    <text x="15" y="115" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">GROWTH CYCLE: 4 DAYS</text>
    <text x="15" y="140" fill="#ffffff" fill-opacity="0.6" font-family="'Courier New', monospace" font-size="10">FLAVOR INTENSITY: +40%</text>

    <path d="M 20 220 L 50 180 L 80 200 L 110 160 L 140 190 L 160 150" fill="none" stroke="#00ffcc" stroke-width="2" filter="url(#glow-green)" />
    <text x="15" y="230" fill="#ffffff" fill-opacity="0.4" font-family="'Courier New', monospace" font-size="8">GENETIC ADAPTABILITY CHART</text>
  </g>

  <!-- Main Titles -->
  <text x="400" y="390" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="1">NEXT-GEN SUSTAINABLE INGREDIENTS</text>
  <text x="400" y="410" text-anchor="middle" fill="#39ff14" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="11" letter-spacing="3" filter="url(#glow-green)">DISCOVERING FUTURE FLAVORS</text>
</svg>
